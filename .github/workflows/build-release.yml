name: Build and Release Offline Package

on:
  # 手动触发
  workflow_dispatch:
  # 定时检查，每小时一次
  schedule:
    - cron: '0 * * * *'
  # 接收来自上游仓库的 webhook 触发
  repository_dispatch:
    types:
      - openclaw-release

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_version: ${{ steps.check.outputs.new_version }}

    steps:
      - name: Check for new release
        id: check
        run: |
          # 获取上游最新版本
          LATEST_VERSION=$(curl -s https://registry.npmjs.org/openclaw/latest | jq -r '.version')
          echo "Latest version: $LATEST_VERSION"

          # 获取当前仓库的最新 release 版本
          CURRENT_VERSION=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" 2>/dev/null | jq -r '.tag_name // "v0.0.0"' | sed 's/^v//')
          echo "Current version: $CURRENT_VERSION"

          # 比较版本
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "New version detected: $LATEST_VERSION"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "No new version"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          # 更新 package.json 中的版本
          $packageJson = Get-Content -Path "package.json" -Raw | ConvertFrom-Json
          $packageJson.dependencies.openclaw = "^$env:VERSION"
          $packageJson | ConvertTo-Json -Depth 10 | Set-Content -Path "package.json"

          Write-Host "Installing OpenClaw version: $env:VERSION"

          # 清理旧的 node_modules
          if (Test-Path "node_modules") {
            Remove-Item -Path "node_modules" -Recurse -Force
          }

          # 安装依赖
          npm install --legacy-peer-deps

          Write-Host "OpenClaw $env:VERSION installed"

      - name: Create offline package
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          # 创建临时目录
          $tempDir = "openclaw-offline-package"
          New-Item -ItemType Directory -Path $tempDir -Force

          # 复制必要文件（使用仓库中的 nodejs 目录）
          Copy-Item -Path "nodejs" -Destination "$tempDir/nodejs" -Recurse -Force
          Copy-Item -Path "node_modules" -Destination "$tempDir/node_modules" -Recurse -Force
          Copy-Item -Path "package.json" -Destination "$tempDir/" -Force
          Copy-Item -Path "package-lock.json" -Destination "$tempDir/" -Force
          Copy-Item -Path "*.bat" -Destination "$tempDir/" -Force
          Copy-Item -Path "README.md" -Destination "$tempDir/" -Force
          Copy-Item -Path ".gitignore" -Destination "$tempDir/" -Force

          # 创建 ZIP 压缩包
          Compress-Archive -Path $tempDir -DestinationPath "openclaw-offline-package-v$env:VERSION.zip" -Force

          Write-Host "Package created: openclaw-offline-package-v$env:VERSION.zip"

          # 获取文件大小
          $fileSize = (Get-Item "openclaw-offline-package-v$env:VERSION.zip").Length / 1MB
          Write-Host "Package size: $([math]::Round($fileSize, 2)) MB"

      - name: Generate checksum
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          $hash = Get-FileHash -Path "openclaw-offline-package-v$env:VERSION.zip" -Algorithm SHA256
          $hash.Hash | Out-File -FilePath "openclaw-offline-package-v$env:VERSION.zip.sha256" -NoNewline
          Write-Host "SHA256: $($hash.Hash)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: OpenClaw v${{ needs.check-version.outputs.new_version }} Offline Package
          body: |
            ## OpenClaw v${{ needs.check-version.outputs.new_version }} Windows 离线安装包

            ### 包含内容
            - Node.js 运行时 (Windows x64)
            - OpenClaw v${{ needs.check-version.outputs.new_version }} 及所有依赖

            ### 使用方法
            1. 下载 `openclaw-offline-package-v${{ needs.check-version.outputs.new_version }}.zip`
            2. 解压到任意目录
            3. 双击 `01_首次配置.bat` 开始配置

            ### 系统要求
            - Windows 10/11 (64-bit)
            - 无需预装 Node.js

            ---

            上游仓库: https://github.com/openclaw/openclaw/releases/tag/v${{ needs.check-version.outputs.new_version }}
          files: |
            openclaw-offline-package-v${{ needs.check-version.outputs.new_version }}.zip
            openclaw-offline-package-v${{ needs.check-version.outputs.new_version }}.zip.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build completed
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          Write-Host "Release v$env:VERSION created successfully!"

  # 清理旧的 release，只保留最近 5 个
  cleanup:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
