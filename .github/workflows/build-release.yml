name: Build and Release Offline Package

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: 'Optional OpenClaw version to build (for example: 2026.4.7). Leave empty to use npm latest.'
        required: false
        type: string

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_version: ${{ steps.check.outputs.new_version }}

    steps:
      - name: Check for new release
        id: check
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.openclaw_version }}
        run: |
          REQUESTED_VERSION="$(echo "${REQUESTED_VERSION:-}" | xargs)"

          if [ -n "$REQUESTED_VERSION" ]; then
            TARGET_VERSION="$REQUESTED_VERSION"
            echo "Requested version: $TARGET_VERSION"
          else
            # 获取上游最新版本
            TARGET_VERSION=$(curl -s https://registry.npmjs.org/openclaw/latest | jq -r '.version')
            echo "Latest version: $TARGET_VERSION"
          fi

          # 获取当前仓库的最新 release 版本
          CURRENT_VERSION=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" 2>/dev/null | jq -r '.tag_name // "v0.0.0"' | sed 's/^v//')
          echo "Current version: $CURRENT_VERSION"

          # 比较版本
          if [ "$TARGET_VERSION" != "$CURRENT_VERSION" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "new_version=$TARGET_VERSION" >> $GITHUB_OUTPUT
            echo "Build target version: $TARGET_VERSION"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Target version already released: $TARGET_VERSION"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download Node.js Windows binaries
        run: |
          # 获取 Node.js 24.x 最新版本
          $versions = Invoke-RestMethod -Uri "https://nodejs.org/dist/index.json"
          $latest24 = $versions | Where-Object { $_.version -match "^v24\." } | Select-Object -First 1
          $nodeVersion = $latest24.version
          Write-Host "Downloading Node.js $nodeVersion for Windows..."

          # 下载 Node.js Windows ZIP
          $url = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "nodejs.zip"

          # 解压并重命名
          Expand-Archive -Path "nodejs.zip" -DestinationPath "." -Force
          Move-Item -Path "node-$nodeVersion-win-x64" -Destination "nodejs" -Force

          Write-Host "Node.js $nodeVersion downloaded"

      - name: Install OpenClaw
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          # 更新 package.json 中的版本
          $packageJson = Get-Content -Path "package.json" -Raw | ConvertFrom-Json
          $packageJson.dependencies.openclaw = "^$env:VERSION"
          $packageJson | ConvertTo-Json -Depth 10 | Set-Content -Path "package.json"

          Write-Host "Installing OpenClaw version: $env:VERSION"

          # 安装依赖
          npm install --legacy-peer-deps

          Write-Host "OpenClaw $env:VERSION installed"

      - name: Smoke check OpenClaw CLI
        run: |
          $nodeExe = "$PWD\nodejs\node.exe"
          $openclawJs = "$PWD\node_modules\openclaw\openclaw.mjs"

          if (!(Test-Path $nodeExe)) {
            throw "Node.js executable not found: $nodeExe"
          }

          if (!(Test-Path $openclawJs)) {
            throw "OpenClaw entrypoint not found: $openclawJs"
          }

          & $nodeExe $openclawJs --help

      - name: Create offline package
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          # 获取工作目录
          $workDir = $PWD.Path
          $tempDir = Join-Path $workDir "openclaw-offline-package"

          Write-Host "Working directory: $workDir"
          Write-Host "Temp directory: $tempDir"

          # 创建临时目录
          New-Item -ItemType Directory -Path $tempDir -Force

          # 复制必要文件（使用绝对路径）
          Copy-Item -Path "$workDir\nodejs" -Destination "$tempDir\nodejs" -Recurse -Force
          Copy-Item -Path "$workDir\node_modules" -Destination "$tempDir\node_modules" -Recurse -Force
          Copy-Item -Path "$workDir\package.json" -Destination "$tempDir\" -Force
          Copy-Item -Path "$workDir\package-lock.json" -Destination "$tempDir\" -Force
          Copy-Item -Path "$workDir\*.bat" -Destination "$tempDir\" -Force
          Copy-Item -Path "$workDir\examples" -Destination "$tempDir\examples" -Recurse -Force
          Copy-Item -Path "$workDir\README.md" -Destination "$tempDir\" -Force
          Copy-Item -Path "$workDir\.gitignore" -Destination "$tempDir\" -Force

          # 创建 ZIP 压缩包
          $zipPath = Join-Path $workDir "openclaw-offline-package-v$env:VERSION.zip"
          Compress-Archive -Path $tempDir -DestinationPath $zipPath -Force

          Write-Host "Package created: openclaw-offline-package-v$env:VERSION.zip"

          # 获取文件大小
          $fileSize = (Get-Item $zipPath).Length / 1MB
          Write-Host "Package size: $([math]::Round($fileSize, 2)) MB"

      - name: Generate checksum
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          $zipFile = "openclaw-offline-package-v$env:VERSION.zip"
          $hash = Get-FileHash -Path $zipFile -Algorithm SHA256
          $hash.Hash | Out-File -FilePath "$zipFile.sha256" -NoNewline
          Write-Host "SHA256: $($hash.Hash)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: OpenClaw v${{ needs.check-version.outputs.new_version }} Offline Package
          body: |
            ## OpenClaw v${{ needs.check-version.outputs.new_version }} Windows 离线安装包

            ### 包含内容
            - Node.js 运行时 (Windows x64)
            - OpenClaw v${{ needs.check-version.outputs.new_version }} 及所有依赖

            ### 使用方法
            1. 下载 `openclaw-offline-package-v${{ needs.check-version.outputs.new_version }}.zip`
            2. 解压到任意目录
            3. 双击 `01_首次配置.bat` 开始配置

            ### 系统要求
            - Windows 10/11 (64-bit)
            - 无需预装 Node.js

            ---

            上游仓库: https://github.com/openclaw/openclaw/releases/tag/v${{ needs.check-version.outputs.new_version }}
          files: |
            openclaw-offline-package-v${{ needs.check-version.outputs.new_version }}.zip
            openclaw-offline-package-v${{ needs.check-version.outputs.new_version }}.zip.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build completed
        env:
          VERSION: ${{ needs.check-version.outputs.new_version }}
        run: |
          Write-Host "Release v$env:VERSION created successfully!"

  # 清理旧的 release，只保留最近 5 个
  cleanup:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
